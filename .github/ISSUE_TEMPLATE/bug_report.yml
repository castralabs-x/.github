name: 🐛 Bug Report
description: Report a bug or unexpected behavior in an X Labs project.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thanks for taking the time to report an issue. Please fill out the form below as completely as possible — it helps us reproduce and fix bugs faster.

        > ⚠️ **Security vulnerabilities** should not be reported here. Please follow our [Security Policy](../SECURITY.md) and email **security@castralabs.com** instead.

  - type: input
    id: project
    attributes:
      label: Affected Project / Repository
      description: Which X Labs project or repo is this bug in?
      placeholder: e.g. x-labs/project-name
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: What version, release tag, or commit SHA are you running?
      placeholder: e.g. v1.2.0 or abc1234
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Walk us through how to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected outcome.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual outcome, including any error messages or logs.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the impact of this bug?
      options:
        - 🔴 Critical — system is broken or data is at risk
        - 🟠 High — major feature is broken or significantly degraded
        - 🟡 Medium — feature partially works, workaround exists
        - 🟢 Low — minor inconvenience or cosmetic issue
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did you encounter this bug?
      multiple: true
      options:
        - Production
        - Staging
        - Local Development
        - CI/CD Pipeline
        - Other
    validations:
      required: true

  - type: textarea
    id: environment_details
    attributes:
      label: Environment Details
      description: OS, browser, runtime version, or any other relevant context.
      placeholder: |
        - OS: macOS 14.x / Windows 11 / Ubuntu 22.04
        - Browser: Chrome 123 / Firefox 124
        - Node.js: v20.x
        - Other relevant versions:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs, stack traces, or attach screenshots. Logs will be automatically formatted.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else you'd like to share — related issues, attempted workarounds, etc.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (I would use the security policy instead).
          required: true
        - label: I have provided enough information to reproduce the issue.
          required: true
